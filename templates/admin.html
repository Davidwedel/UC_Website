<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - {{ site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin</h1>
            <p class="subtitle">
                <a href="{{ url_for('index') }}" style="color:white;">View Site</a>
                &nbsp;|&nbsp;
                <a href="{{ url_for('admin_logout') }}" style="color:white;">Logout</a>
            </p>
        </header>
        <main>
            <div class="upload-section">
                <h2 class="date-header" style="margin-bottom:16px;">Upload Recording</h2>
                <form method="post" action="{{ url_for('admin_upload') }}" enctype="multipart/form-data" class="upload-form">
                    <div class="drop-zone" id="dropZone">
                        <span class="drop-zone__prompt">Drop audio file here or click to browse</span>
                        <span class="drop-zone__filename" id="dropZoneFilename"></span>
                        <input type="file" name="audio_file" id="audioFile"
                               accept=".mp3,.wav,.m4a,.ogg,.aac,.flac"
                               class="drop-zone__input" required>
                    </div>
                    <div class="upload-meta">
                        <div class="upload-field">
                            <label for="recordingDate">Date</label>
                            <input type="date" name="recording_date" id="recordingDate" value="{{ today }}" required>
                        </div>
                        <div class="upload-field">
                            <label for="recordingTitle">Title (optional)</label>
                            <input type="text" name="title" id="recordingTitle" placeholder="e.g. Sunday Morning Service">
                        </div>
                        <button type="submit" class="listen-btn upload-submit">Upload</button>
                    </div>
                </form>
            </div>
            {% if recordings %}
            <div class="recordings-list">
                {% for r in recordings %}
                <div class="recording-card {% if r.hidden %}card-hidden{% endif %}">
                    <div class="recording-info">
                        <div class="recording-date">{{ r.received_at }}</div>
                        <div class="recording-title">
                            {{ r.custom_title or r.title or '(no title)' }}
                            {% if r.hidden %}<span class="badge-hidden">hidden</span>{% endif %}
                        </div>
                    </div>
                    <div class="admin-actions">
                        <form method="post" action="{{ url_for('admin_update_title', id=r.id) }}" class="title-form">
                            <input type="text" name="title" value="{{ r.custom_title or '' }}"
                                   placeholder="{{ r.title or 'Custom title...' }}">
                            <button type="submit">Save</button>
                        </form>
                        <form method="post" action="{{ url_for('admin_toggle_hidden', id=r.id) }}">
                            <button type="submit" class="btn-toggle {% if r.hidden %}btn-show{% else %}btn-hide{% endif %}">
                                {{ 'Show' if r.hidden else 'Hide' }}
                            </button>
                        </form>
                        <a href="{{ r.link }}" target="_blank" rel="noopener noreferrer" class="listen-btn">Listen</a>
                        <form method="post" action="{{ url_for('admin_delete', id=r.id) }}"
                              onsubmit="return confirm('Delete this recording?')">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                    </div>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="no-recordings"><p>No recordings yet.</p></div>
            {% endif %}
        </main>
    </div>
<script>
(function() {
    var zone = document.getElementById('dropZone');
    var input = document.getElementById('audioFile');
    var label = document.getElementById('dropZoneFilename');

    zone.addEventListener('click', function() { input.click(); });
    input.addEventListener('change', function() {
        label.textContent = input.files[0] ? input.files[0].name : '';
    });
    zone.addEventListener('dragover', function(e) {
        e.preventDefault();
        zone.classList.add('drop-zone--over');
    });
    ['dragleave', 'dragend'].forEach(function(t) {
        zone.addEventListener(t, function() { zone.classList.remove('drop-zone--over'); });
    });
    zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drop-zone--over');
        if (e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            label.textContent = input.files[0].name;
        }
    });
})();
</script>
</body>
</html>
